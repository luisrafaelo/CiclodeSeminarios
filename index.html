<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Consulta de Asistencia</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
  <!-- ============================================================
       ESTILOS CSS
  ============================================================ -->
  <style>
    /* ---------- Variables ---------- */
    :root {
      --bg-start:    #0f0c29;
      --bg-mid:      #302b63;
      --bg-end:      #24243e;
      --card-bg:     rgba(255 255 255 / 0.07);
      --card-border: rgba(255 255 255 / 0.12);
      --accent:      #a78bfa;
      --accent-glow: rgba(167 139 250 / 0.35);
      --text-main:   #f0eeff;
      --text-muted:  rgba(240 238 255 / 0.55);
      --success:     #34d399;
      --warning:     #fbbf24;
      --danger:      #f87171;
      --radius:      20px;
      --transition:  0.35s cubic-bezier(0.4, 0, 0.2, 1);
    }

    /* ---------- Reset & base ---------- */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Inter', sans-serif;
      background: linear-gradient(135deg, var(--bg-start), var(--bg-mid), var(--bg-end));
      background-attachment: fixed;
      color: var(--text-main);
      padding: clamp(1rem, 4vw, 1.5rem);
      overflow-x: hidden;
    }

    /* Orbes decorativos de fondo */
    body::before,
    body::after {
      content: '';
      position: fixed;
      border-radius: 50%;
      filter: blur(80px);
      pointer-events: none;
      z-index: 0;
    }
    body::before {
      width: 420px; height: 420px;
      background: radial-gradient(circle, rgba(167,139,250,0.18), transparent 70%);
      top: -100px; left: -100px;
    }
    body::after {
      width: 300px; height: 300px;
      background: radial-gradient(circle, rgba(99,102,241,0.2), transparent 70%);
      bottom: -80px; right: -80px;
    }

    /* ---------- Tarjeta principal ---------- */
    .card {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 480px;
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: var(--radius);
      padding: 2.8rem 2.4rem;
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      box-shadow:
        0 8px 32px rgba(0,0,0,0.35),
        0 0 0 1px rgba(255,255,255,0.04) inset;
      animation: cardIn 0.6s var(--transition) both;
    }

    @keyframes cardIn {
      from { opacity: 0; transform: translateY(30px) scale(0.97); }
      to   { opacity: 1; transform: translateY(0)   scale(1);    }
    }

    /* ---------- Encabezado ---------- */
    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 2rem;
    }
    .brand-dot {
      width: 10px; height: 10px;
      border-radius: 50%;
      background: var(--accent);
      box-shadow: 0 0 12px var(--accent-glow);
      animation: pulse 2s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1);   opacity: 1; }
      50%       { transform: scale(1.4); opacity: 0.7; }
    }
    .brand-label {
      font-family: 'Syne', sans-serif;
      font-size: 0.8rem;
      font-weight: 700;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--accent);
    }

    h1 {
      font-family: 'Syne', sans-serif;
      font-size: clamp(1.4rem, 6vw, 1.9rem);
      font-weight: 800;
      line-height: 1.15;
      margin-bottom: 0.5rem;
      letter-spacing: -0.02em;
    }
    .subtitle {
      font-size: 0.9rem;
      color: var(--text-muted);
      margin-bottom: 2rem;
      line-height: 1.5;
    }

    /* ---------- Formulario ---------- */
    .form-group {
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
    }

    label {
      font-size: 0.78rem;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--text-muted);
    }

    input[type="text"] {
      width: 100%;
      padding: 1rem 1.25rem;
      font-family: 'DM Sans', sans-serif;
      font-size: 1.2rem;
      font-weight: 500;
      color: var(--text-main);
      background: rgba(255 255 255 / 0.06);
      border: 1.5px solid rgba(255 255 255 / 0.1);
      border-radius: 12px;
      outline: none;
      transition: border-color var(--transition), box-shadow var(--transition), background var(--transition);
      letter-spacing: 0.04em;
    }
    input[type="text"]::placeholder { color: rgba(255 255 255 / 0.25); }
    input[type="text"]:focus {
      border-color: var(--accent);
      background: rgba(167 139 250 / 0.08);
      box-shadow: 0 0 0 4px var(--accent-glow);
    }

    /* ---------- Botón ---------- */
    button#btn-consultar {
      margin-top: 0.25rem;
      width: 100%;
      padding: 1rem;
      font-family: 'Syne', sans-serif;
      font-size: 1rem;
      font-weight: 700;
      letter-spacing: 0.04em;
      color: #fff;
      background: linear-gradient(135deg, #7c3aed, #a78bfa);
      border: none;
      border-radius: 12px;
      cursor: pointer;
      position: relative;
      overflow: hidden;
      transition: transform var(--transition), box-shadow var(--transition), opacity var(--transition);
      box-shadow: 0 4px 20px rgba(124, 58, 237, 0.45);
    }
    button#btn-consultar::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(255,255,255,0.12), transparent);
      opacity: 0;
      transition: opacity var(--transition);
    }
    button#btn-consultar:hover:not(:disabled) {
      transform: translateY(-2px);
      box-shadow: 0 8px 28px rgba(124, 58, 237, 0.55);
    }
    button#btn-consultar:hover:not(:disabled)::before { opacity: 1; }
    button#btn-consultar:active:not(:disabled) {
      transform: translateY(0);
      box-shadow: 0 2px 10px rgba(124, 58, 237, 0.4);
    }
    button#btn-consultar:disabled { opacity: 0.55; cursor: not-allowed; }

    /* ---------- Spinner ---------- */
    .spinner {
      display: none;
      width: 22px; height: 22px;
      border: 2.5px solid rgba(255,255,255,0.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      margin: 0 auto;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .btn-text { display: block; }

    /* ---------- Área de resultados ---------- */
    #resultado {
      margin-top: 1.8rem;
      opacity: 0;
      transform: translateY(12px);
      transition: opacity 0.45s ease, transform 0.45s ease;
      pointer-events: none;
    }
    #resultado.visible {
      opacity: 1;
      transform: translateY(0);
      pointer-events: auto;
    }

    /* Divider */
    .divider {
      border: none;
      height: 1px;
      background: linear-gradient(to right, transparent, rgba(255,255,255,0.1), transparent);
      margin-bottom: 1.5rem;
    }

    /* Grid de stats */
    .stats-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 0.9rem;
      margin-bottom: 1rem;
    }
    .stat-box {
      background: rgba(255 255 255 / 0.05);
      border: 1px solid rgba(255 255 255 / 0.08);
      border-radius: 12px;
      padding: 1rem;
      text-align: center;
    }
    .stat-box .stat-label {
      font-size: 0.7rem;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 0.35rem;
    }
    .stat-box .stat-value {
      font-family: 'Syne', sans-serif;
      font-size: 1.5rem;
      font-weight: 800;
      color: var(--text-main);
    }

    /* Estado badge */
    .estado-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      width: 100%;
      justify-content: center;
      padding: 0.75rem 1rem;
      border-radius: 10px;
      font-family: 'Syne', sans-serif;
      font-size: 0.85rem;
      font-weight: 700;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      margin-top: 0.5rem;
    }
    .estado-badge.danger  { background: rgba(248,113,113,0.15); color: var(--danger);  border: 1px solid rgba(248,113,113,0.25); }
    .estado-badge.warning { background: rgba(251,191,36,0.12);  color: var(--warning); border: 1px solid rgba(251,191,36,0.25); }
    .estado-badge.success { background: rgba(52,211,153,0.12);  color: var(--success); border: 1px solid rgba(52,211,153,0.25); }

    /* Mensaje de error */
    .error-msg {
      text-align: center;
      padding: 1rem;
      border-radius: 10px;
      background: rgba(248,113,113,0.12);
      border: 1px solid rgba(248,113,113,0.25);
      color: var(--danger);
      font-weight: 500;
      font-size: 0.95rem;
    }

    /* Validación vacío */
    .input-error { border-color: var(--danger) !important; box-shadow: 0 0 0 3px rgba(248,113,113,0.2) !important; }
    .hint { font-size: 0.78rem; color: var(--danger); margin-top: 0.25rem; display: none; }
    .hint.show { display: block; }

    /* ---------- Footer ---------- */
    .footer {
      margin-top: 2rem;
      text-align: center;
      font-size: 0.72rem;
      color: rgba(255 255 255 / 0.2);
      letter-spacing: 0.05em;
    }

    /* ---------- Responsive ---------- */
    @media (max-width: 480px) {
      .card { padding: 2rem 1.5rem; }
      .stats-grid { grid-template-columns: 1fr 1fr; }
    }
  </style>
</head>
<body>

  <!-- ============================================================
       HTML — Estructura
  ============================================================ -->
  <div class="card" role="main">

    <!-- Encabezado de marca -->
    <div class="brand">
      <div class="brand-dot" aria-hidden="true"></div>
      <span class="brand-label">Sistema de Asistencia</span>
    </div>

    <h1>Consulta tu<br>asistencia</h1>
    <p class="subtitle">Ingresa tu Registro Universitario (RU) para ver<br>tu estado de asistencia actualizado.</p>

    <!-- Formulario -->
    <div class="form-group">
      <label for="input-ru">Registro Universitario (RU)</label>
      <input
        type="text"
        id="input-ru"
        placeholder="Ej. 12345"
        maxlength="12"
        autocomplete="off"
        aria-describedby="hint-ru"
      />
      <span class="hint" id="hint-ru" role="alert">Por favor ingresa tu RU antes de consultar.</span>

      <button id="btn-consultar" aria-live="polite">
        <span class="btn-text">Consultar</span>
        <div class="spinner" aria-label="Cargando..." role="status"></div>
      </button>
    </div>

    <!-- Área de resultados (oculta hasta la respuesta) -->
    <div id="resultado" aria-live="polite" aria-atomic="true">
      <!-- El contenido se inyecta dinámicamente con JS -->
    </div>

    <p class="footer">© 2026 · CEIE</p>
  </div>

  <!-- ============================================================
       JAVASCRIPT — Lógica
  ============================================================ -->
  <script>
    /* -------------------------------------------------------
       CONSTANTE DE API — Cambia solo esta URL cuando estés listo
    ------------------------------------------------------- */
    const API_URL = 'https://script.google.com/macros/s/AKfycbwDVy0e6Fbdyqcm0hnKaIMH-iHtejW7Hd3f_7Eutybh_tV5Bkn0bDBihBjrVdo0vnps/exec';

    /* -------------------------------------------------------
       Referencias al DOM
    ------------------------------------------------------- */
    const inputRU    = document.getElementById('input-ru');
    const btnConsult = document.getElementById('btn-consultar');
    const btnText    = btnConsult.querySelector('.btn-text');
    const spinner    = btnConsult.querySelector('.spinner');
    const resultado  = document.getElementById('resultado');
    const hintRU     = document.getElementById('hint-ru');

    /* -------------------------------------------------------
       Utilidades
    ------------------------------------------------------- */

    /** Muestra el spinner y deshabilita el botón */
    function setLoading(active) {
      btnConsult.disabled = active;
      btnText.style.display  = active ? 'none'  : 'block';
      spinner.style.display  = active ? 'block' : 'none';
    }

    /** Muestra u oculta el área de resultados con fade-in */
    function showResultado(html) {
      resultado.innerHTML = html;
      resultado.classList.remove('visible');
      // Pequeño retraso para que la transición CSS se dispare correctamente
      requestAnimationFrame(() => {
        requestAnimationFrame(() => resultado.classList.add('visible'));
      });
    }

    /** Limpia la validación del input */
    function clearInputError() {
      inputRU.classList.remove('input-error');
      hintRU.classList.remove('show');
    }

    /* -------------------------------------------------------
       Determina el estado del badge según el porcentaje
       Reglas:
         < 53% → AÚN NO CERTIFICA  (danger)
         53–68% → 1 CERTIFICADO    (warning)  aprox 10/19
         68–84% → 2 CERTIFICADOS   (warning)  aprox 13/19
         ≥ 84% → 3 CERTIFICADOS    (success)  aprox 16/19
    ------------------------------------------------------- */
    function getBadgeClass(estado) {
      const e = (estado || '').toUpperCase();
      if (e.includes('NO CERTIFICA') || e.includes('AUN NO')) return 'danger';
      if (e.includes('3 CERT')) return 'success';
      return 'warning';
    }

    /** Ícono SVG según clase de badge */
    function getBadgeIcon(cls) {
      const icons = {
        danger:  '✗',
        warning: '⚡',
        success: '✓',
      };
      return icons[cls] || '•';
    }

    /* -------------------------------------------------------
       Renderiza el resultado exitoso
    ------------------------------------------------------- */
function renderResult(data) {
  const badgeClass = getBadgeClass(data.estado);
  const icon       = getBadgeIcon(badgeClass);

  showResultado(`
    <hr class="divider" />

    <div class="stats-grid">
      <!-- Nombre completo -->
      <div class="stat-box" style="grid-column: 1 / -1;">
        <div class="stat-label">Estudiante</div>
        <div class="stat-value">
          ${data.nombre} ${data.apellido}
        </div>
      </div>

      <div class="stat-box">
        <div class="stat-label">RU</div>
        <div class="stat-value">${data.ru}</div>
      </div>

      <div class="stat-box">
        <div class="stat-label">Asistencia</div>
        <div class="stat-value">${data.porcentaje}</div>
      </div>

      <div class="stat-box" style="grid-column: 1 / -1;">
        <div class="stat-label">Clases asistidas</div>
        <div class="stat-value">${data.total}</div>
      </div>
    </div>

    <div class="estado-badge ${badgeClass}" role="status">
      <span aria-hidden="true">${icon}</span>
      ${data.estado}
    </div>
  `);
}

    /* -------------------------------------------------------
       Renderiza un error (RU no encontrado u otro)
    ------------------------------------------------------- */
    function renderError(msg) {
      showResultado(`<hr class="divider" /><div class="error-msg">${msg}</div>`);
    }

    /* -------------------------------------------------------
       Función principal: consulta a la API
    ------------------------------------------------------- */
    async function consultarAsistencia() {
      const ru = inputRU.value.trim();

      /* Validación: campo vacío */
      if (!ru) {
        inputRU.classList.add('input-error');
        hintRU.classList.add('show');
        inputRU.focus();
        return;
      }

      clearInputError();
      setLoading(true);

    try {
      const response = await fetch(`${API_URL}?ru=${encodeURIComponent(ru)}`);
      const data = await response.json();

      // ✅ Detectar error por el campo JSON, no por HTTP status
      if (data.error) {
        if (data.status === 404) {
          renderError('⚠ RU no encontrado. Verifica el número e intenta de nuevo.');
        } else {
          renderError('⚠ Error del servidor: ' + data.error);
        }
        return;
      }

      renderResult(data);

    } catch (err) {
      console.error('[Asistencia] Error al consultar:', err);
      renderError('⚠ No se pudo conectar al servidor. Intenta más tarde.');
    } finally {
      setLoading(false);
    }
    }

    /* -------------------------------------------------------
       Eventos
    ------------------------------------------------------- */

    /* Clic en "Consultar" */
    btnConsult.addEventListener('click', consultarAsistencia);

    /* Permitir Enter desde el input */
    inputRU.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') consultarAsistencia();
    });

    /* Limpiar error al empezar a escribir */
    inputRU.addEventListener('input', clearInputError);
  </script>

</body>
</html>
